services:
  app:
    build: .
    container_name: wine-cellar
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://wine:${DB_PASSWORD:-password}@db:5432/wine_cellar
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cellar.rule=Host(`cellar.zubi.wine`)"
      - "traefik.http.routers.cellar.entrypoints=https"
      - "traefik.http.routers.cellar.tls=true"
      - "traefik.http.routers.cellar.tls.certresolver=letsencrypt"
      - "traefik.http.services.cellar.loadbalancer.server.port=3000"
      - "traefik.http.routers.cellar-http.rule=Host(`cellar.zubi.wine`)"
      - "traefik.http.routers.cellar-http.entrypoints=http"
      - "traefik.http.routers.cellar-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  db:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=wine
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=wine_cellar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wine -d wine_cellar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  coolify:
    external: true

volumes:
  postgres_data:
